<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assessment App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="justify-content: center; align-items: center;">

    <div class="glass-panel fade-in" style="width: 100%; max-width: 400px;">
        <h2 class="title-gradient" style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p id="errorMessage" style="color: var(--danger-color); text-align: center; margin-top: 1rem; display: none;"></p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
